<!-- ai-enhanced version -->
<!-- asked claude to take the skeleton and add semantic tags + the meta stuff we covered. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hello, mateo</title>
  <meta name="description" content="a hello page by mateo">
</head>
<body>
  <header>
    <h1>hello</h1>
  </header>
  <main>
    <section>
      <p>this is the ai-enhanced version. it adds semantic tags like header, main, section, and footer. it also adds the viewport meta tag for mobile, and a description meta tag.</p>
    </section>
  </main>
  <footer>
    <p>made by mateo. summer 2026.</p>
  </footer>
</body>
</html>
