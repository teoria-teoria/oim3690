<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e3e3e3;
      --text: #1a1a1a;
      --muted: #8a8a8a;
      --accent: #16876c;      /* deep teal-green, the single accent */
      --accent-weak: #e7f3ef;
      --radius: 6px;
      --prio-low: #6f9fd8;
      --prio-medium: #e0a93b;
      --prio-high: #d8513f;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 48px 16px;
      font-size: 15px;
      line-height: 1.4;
    }

    .app {
      max-width: 540px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .count {
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* Add row */
    .add {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add input[type="text"] {
      flex: 1 1 auto;
      min-width: 0;
      padding: 9px 11px;
      font: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .add input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-weak);
    }

    select {
      font: inherit;
      padding: 9px 8px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--accent); }

    button {
      font: inherit;
      font-weight: 500;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 9px 12px;
    }
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .add button {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      white-space: nowrap;
    }
    .add button:hover { background: #126b56; border-color: #126b56; }

    /* Toolbar: filters + clear */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .filters { display: flex; gap: 6px; }

    .filter {
      padding: 5px 10px;
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      border-color: transparent;
    }
    .filter:hover { color: var(--text); }
    .filter.active {
      background: var(--accent-weak);
      color: var(--accent);
      border-color: var(--accent-weak);
    }

    .clear {
      margin-left: auto;
      font-size: 13px;
      padding: 5px 10px;
      color: var(--muted);
      border-color: transparent;
      background: transparent;
    }
    .clear:hover { color: var(--prio-high); }
    .clear:disabled { opacity: 0.4; cursor: default; }

    /* List */
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    li {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      border-top: 1px solid var(--border);
    }
    li:first-child { border-top: none; }

    li input[type="checkbox"] {
      flex: none;
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
      cursor: pointer;
      margin: 0;
    }

    .dot {
      flex: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.low { background: var(--prio-low); }
    .dot.medium { background: var(--prio-medium); }
    .dot.high { background: var(--prio-high); }

    .text {
      flex: 1 1 auto;
      min-width: 0;
      word-break: break-word;
    }
    li.done .text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .del {
      flex: none;
      width: 24px;
      height: 24px;
      padding: 0;
      line-height: 1;
      font-size: 17px;
      color: var(--muted);
      border-color: transparent;
      background: transparent;
    }
    .del:hover { color: var(--prio-high); }

    .empty {
      padding: 24px 13px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 460px) {
      body { padding: 28px 12px; }
      .add { flex-wrap: wrap; }
      .add input[type="text"] { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Tasks</h1>
      <span class="count" id="count"></span>
    </header>

    <form class="add" id="add-form">
      <input type="text" id="task-input" placeholder="What needs doing?" autocomplete="off" maxlength="200">
      <select id="priority-select" aria-label="Priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <div class="toolbar">
      <div class="filters" id="filters">
        <button type="button" class="filter active" data-filter="all">All</button>
        <button type="button" class="filter" data-filter="active">Active</button>
        <button type="button" class="filter" data-filter="completed">Completed</button>
      </div>
      <button type="button" class="clear" id="clear-completed">Clear completed</button>
    </div>

    <ul id="list"></ul>
  </main>

  <script src="todo.js"></script>
</body>
</html>
